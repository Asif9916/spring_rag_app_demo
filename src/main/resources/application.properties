spring.application.name=first-project
server.port=8082
#spring.ai.chat.client.enabled=false
#api key for open ai
spring.ai.openai.api-key= ${api-key}

#custom model we are using
spring.ai.openai.chat.options.model=gpt-4.1
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.max_tokens=1000

logging.level.org.springframework.ai.chat.client.advisor=DEBUG

#db configurations
spring.datasource.url=jdbc:mariadb://localhost:3306/spring_ai
spring.datasource.username=root
spring.datasource.password=root

spring.ai.vectorstore.mariadb.initialize-schema=true
spring.ai.vectorstore.mariadb.distance-type=COSINE
spring.ai.vectorstore.mariadb.dimensions=1536

